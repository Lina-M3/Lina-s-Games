<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#5A4155" />
  <meta name="description" content="Parental Controls — a simple, bilingual guide for parents to keep kids safe online across iPhone, Android, Windows, Mac, and YouTube." />
  <title>Parental Controls · Keeping Kids Safe Online</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Eliza palette */
      --fig: #5A4155;
      --fig-deep: #3d2c38;
      --fig-soft: #efe4ea;
      --storm: #445662;
      --chambray: #8FA4B0;
      --timber: #9D836C;
      --timber-soft: #f1e8dd;
      --manuscript: #EFEAD9;
      --manuscript-2: #f7f2e4;

      --bg: #f4efe0;           /* slightly lighter than manuscript for breathing */
      --surface: #fdfbf3;
      --ink: #2a1f27;
      --ink-2: #4a3d45;
      --muted: #7b6b74;
      --line: #e3d9c8;
      --line-2: #eee6d4;

      --shadow-sm: 0 1px 2px rgba(58, 41, 53, 0.05), 0 1px 3px rgba(58, 41, 53, 0.06);
      --shadow-md: 0 6px 14px rgba(58, 41, 53, 0.07), 0 2px 4px rgba(58, 41, 53, 0.04);
      --shadow-lg: 0 20px 40px rgba(58, 41, 53, 0.10), 0 6px 12px rgba(58, 41, 53, 0.05);

      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 22px;
      --r-xl: 28px;

      --font-serif: "Fraunces", Georgia, "Times New Roman", serif;
      --font-sans: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-ar: "IBM Plex Sans Arabic", "Tajawal", system-ui, Tahoma, sans-serif;

      /* Type scale — small, controlled, mobile-first */
      --fs-xs: 0.72rem;
      --fs-sm: 0.82rem;
      --fs-base: 0.92rem;
      --fs-md: 1rem;
      --fs-lg: 1.08rem;
      --fs-xl: 1.25rem;
      --fs-2xl: 1.55rem;
      --fs-3xl: 1.9rem;
    }

    *,
    *::before,
    *::after { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      background-image:
        radial-gradient(1000px 500px at 90% -200px, rgba(90, 65, 85, 0.08), transparent 60%),
        radial-gradient(800px 400px at -10% 10%, rgba(157, 131, 108, 0.08), transparent 60%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body.rtl {
      font-family: var(--font-ar);
    }

    /* Serif headings apply only to LTR (English) */
    body:not(.rtl) h1,
    body:not(.rtl) h2,
    body:not(.rtl) .serif {
      font-family: var(--font-serif);
      font-weight: 600;
      letter-spacing: -0.015em;
    }

    body.rtl h1,
    body.rtl h2,
    body.rtl h3,
    body.rtl h4 {
      font-weight: 700;
      letter-spacing: 0;
    }

    img, svg { display: block; max-width: 100%; }
    a { color: inherit; }
    button { font: inherit; color: inherit; }

    /* ─── Layout ─── */
    .wrap {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px calc(40px + env(safe-area-inset-bottom));
    }

    /* ─── Top bar ─── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: saturate(1.2) blur(14px);
      -webkit-backdrop-filter: saturate(1.2) blur(14px);
      background: rgba(244, 239, 224, 0.82);
      border-bottom: 1px solid rgba(227, 217, 200, 0.7);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 16px;
      max-width: 720px;
      margin: 0 auto;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background: linear-gradient(140deg, var(--fig), var(--fig-deep));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fdfbf3;
      box-shadow: 0 3px 8px rgba(90, 65, 85, 0.28);
    }
    .brand-mark svg { width: 16px; height: 16px; }
    .brand-text { font-size: var(--fs-base); font-weight: 600; }

    .lang-switch {
      display: inline-flex;
      padding: 3px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
    }
    .lang-btn {
      border: 0;
      background: transparent;
      padding: 5px 11px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: var(--fs-sm);
      color: var(--ink-2);
    }
    .lang-btn.active {
      background: var(--ink);
      color: var(--manuscript);
    }

    /* ─── Hero ─── */
    .hero {
      margin-top: 18px;
      position: relative;
      overflow: hidden;
      border-radius: var(--r-xl);
      padding: 24px 20px 26px;
      color: #f5ecef;
      background:
        radial-gradient(900px 400px at 110% -50%, rgba(157,131,108,0.30), transparent 60%),
        linear-gradient(155deg, #5A4155 0%, #4a3446 55%, #3d2c38 100%);
      box-shadow: var(--shadow-lg);
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.45;
      pointer-events: none;
      mask-image: linear-gradient(180deg, black 20%, transparent 90%);
      -webkit-mask-image: linear-gradient(180deg, black 20%, transparent 90%);
    }

    .hero-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      font-family: var(--font-sans);
      font-size: var(--fs-xs);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    body.rtl .hero-badge {
      font-family: var(--font-ar);
      letter-spacing: 0;
      text-transform: none;
    }
    .hero-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d8b6a0;
      box-shadow: 0 0 0 3px rgba(216,182,160,0.22);
    }

    .hero h1 {
      position: relative;
      margin: 12px 0 10px;
      font-size: clamp(1.5rem, 5.2vw, 2rem);
      line-height: 1.2;
      font-weight: 600;
    }
    body.rtl .hero h1 {
      font-size: clamp(1.45rem, 5.2vw, 1.95rem);
      line-height: 1.35;
    }

    .hero p {
      position: relative;
      margin: 0;
      color: rgba(245, 236, 239, 0.84);
      font-size: var(--fs-base);
      line-height: 1.55;
      max-width: 54ch;
    }

    .hero-meta {
      position: relative;
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 11px 6px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      font-size: var(--fs-xs);
      color: rgba(255,255,255,0.88);
      font-weight: 500;
      line-height: 1.3;
    }
    .meta-chip svg { width: 13px; height: 13px; stroke: #e0c5b3; flex-shrink: 0; }

    /* ─── Section shell ─── */
    .section {
      margin-top: 26px;
    }
    .section-head {
      margin-bottom: 14px;
      padding: 0 2px;
    }
    .eyebrow {
      font-family: var(--font-sans);
      font-size: var(--fs-xs);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fig);
      margin: 0 0 6px;
    }
    body.rtl .eyebrow {
      font-family: var(--font-ar);
      letter-spacing: 0;
      text-transform: none;
    }

    .section h2 {
      margin: 0 0 5px;
      font-size: var(--fs-2xl);
      font-weight: 600;
      line-height: 1.25;
      color: var(--ink);
    }
    body.rtl .section h2 {
      font-size: 1.35rem;
      line-height: 1.4;
    }
    .section .lead {
      margin: 0;
      color: var(--muted);
      font-size: var(--fs-base);
      line-height: 1.55;
    }

    /* ─── Device chooser — 2x2 grid on mobile ─── */
    .device-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (min-width: 640px) {
      .device-tabs { grid-template-columns: repeat(4, 1fr); }
    }

    .device-tab {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 14px 14px 13px;
      cursor: pointer;
      text-align: start;
      transition: border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .device-tab:hover {
      border-color: var(--chambray);
      transform: translateY(-1px);
    }
    .device-tab.active {
      border-color: var(--fig);
      box-shadow: 0 0 0 3px var(--fig-soft), var(--shadow-sm);
      background: #fefdf7;
    }
    .device-tab .icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--fig-soft);
      color: var(--fig);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    .device-tab .icon svg { width: 15px; height: 15px; }
    .device-tab .t-name {
      font-weight: 700;
      font-size: var(--fs-base);
      color: var(--ink);
      line-height: 1.25;
    }
    .device-tab .t-desc {
      font-size: var(--fs-sm);
      color: var(--muted);
      line-height: 1.35;
    }

    /* ─── Guide card ─── */
    .guide, .yt-card {
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 22px 20px;
      box-shadow: var(--shadow-md);
    }

    .guide-title-row,
    .yt-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .guide-title-row .icon {
      width: 38px; height: 38px;
      border-radius: 11px;
      background: var(--fig-soft);
      color: var(--fig);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .guide-title-row .icon svg { width: 19px; height: 19px; }

    .guide-title-row h3,
    .yt-head h3 {
      margin: 2px 0 3px;
      font-size: var(--fs-lg);
      font-weight: 700;
      letter-spacing: -0.005em;
      line-height: 1.3;
      color: var(--ink);
    }
    body.rtl .guide-title-row h3,
    body.rtl .yt-head h3 {
      font-size: 1.05rem;
    }
    .guide-title-row p,
    .yt-head p {
      margin: 0;
      color: var(--muted);
      font-size: var(--fs-sm);
      line-height: 1.5;
    }

    /* Steps */
    .sub-label {
      display: block;
      font-size: var(--fs-xs);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--storm);
      margin: 16px 0 10px;
    }
    body.rtl .sub-label { letter-spacing: 0; text-transform: none; }

    .steps {
      list-style: none;
      margin: 0;
      padding: 0;
      position: relative;
    }
    .steps::before {
      content: "";
      position: absolute;
      top: 14px;
      bottom: 14px;
      inset-inline-start: 14px;
      width: 2px;
      background: linear-gradient(180deg, var(--fig-soft), transparent);
      border-radius: 2px;
    }
    .step {
      position: relative;
      padding-inline-start: 42px;
      padding-block: 7px;
      font-size: var(--fs-base);
      line-height: 1.55;
      color: var(--ink-2);
    }
    .step + .step { margin-top: 5px; }
    .step-num {
      position: absolute;
      inset-inline-start: 0;
      top: 5px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--fig);
      color: var(--fig);
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: var(--fs-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 4px var(--bg);
    }
    body.rtl .step-num { font-family: var(--font-ar); }
    .step strong { color: var(--ink); font-weight: 600; }

    /* Feature / privacy boxes */
    .info-stack {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    .info-box {
      padding: 14px 16px;
      border-radius: var(--r-md);
      border: 1px solid var(--line);
      background: var(--manuscript-2);
    }
    .info-box.privacy {
      background: var(--timber-soft);
      border-color: #e6d2bd;
    }
    .info-box-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: var(--fs-base);
      margin: 0 0 6px;
      color: var(--ink);
    }
    .info-box-title svg { width: 15px; height: 15px; stroke: var(--fig); }
    .info-box.privacy .info-box-title { color: #5f3e25; }
    .info-box.privacy .info-box-title svg { stroke: #8a5a3a; }
    .info-box ul {
      margin: 0;
      padding-inline-start: 20px;
      color: var(--ink-2);
      font-size: var(--fs-base);
      line-height: 1.55;
    }
    .info-box ul li + li { margin-top: 3px; }
    .info-box p {
      margin: 0;
      color: var(--ink-2);
      font-size: var(--fs-base);
      line-height: 1.55;
    }

    /* ─── YouTube Shorts card ─── */
    .yt-card { position: relative; overflow: hidden; }
    .yt-card::before {
      content: "";
      position: absolute;
      top: -40px;
      inset-inline-end: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 0, 0, 0.06), transparent 70%);
      pointer-events: none;
    }
    .yt-logo {
      width: 40px; height: 40px;
      border-radius: 11px;
      background: #ff0000;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(255, 0, 0, 0.2);
    }
    .yt-logo svg { width: 22px; height: 22px; color: #fff; }

    .yt-note {
      margin-top: 14px;
      padding: 11px 13px;
      background: #faf3e5;
      border: 1px solid #ebdcbe;
      border-radius: var(--r-sm);
      color: #6a5025;
      font-size: var(--fs-sm);
      line-height: 1.55;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .yt-note svg {
      width: 15px; height: 15px;
      flex-shrink: 0;
      margin-top: 2px;
      stroke: #9a6a2a;
    }

    /* Tips */
    .tips {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    @media (min-width: 520px) {
      .tips { grid-template-columns: 1fr 1fr; }
    }
    .tip {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
    }
    .tip-ic {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--fig-soft);
      color: var(--fig);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 9px;
    }
    .tip-ic svg { width: 15px; height: 15px; }
    .tip h4 {
      margin: 0 0 4px;
      font-size: var(--fs-md);
      font-weight: 700;
      line-height: 1.3;
      color: var(--ink);
    }
    .tip p {
      margin: 0;
      color: var(--muted);
      font-size: var(--fs-sm);
      line-height: 1.55;
    }

    /* Awareness message */
    .awareness {
      margin-top: 14px;
      padding: 18px 20px;
      border-radius: var(--r-lg);
      background: linear-gradient(135deg, #3d2c38 0%, #2f2030 100%);
      color: #f0e6eb;
      border: 1px solid #2d1f28;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }
    .awareness::before {
      content: "";
      position: absolute;
      top: -60px;
      inset-inline-end: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(157,131,108,0.28), transparent 70%);
      pointer-events: none;
    }
    .awareness-label {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--fs-xs);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #e0c5b3;
      margin: 0 0 6px;
    }
    body.rtl .awareness-label { letter-spacing: 0; text-transform: none; }
    .awareness-label svg { width: 13px; height: 13px; }
    .awareness p {
      position: relative;
      margin: 0;
      font-size: var(--fs-base);
      line-height: 1.6;
    }

    /* References */
    .refs {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      box-shadow: var(--shadow-sm);
    }
    .refs-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0;
    }
    .refs-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 2px;
      text-decoration: none;
      border-bottom: 1px solid var(--line-2);
      color: var(--ink);
      font-size: var(--fs-base);
      font-weight: 500;
      line-height: 1.45;
      transition: color 0.15s ease;
    }
    .refs-list li:last-child a { border-bottom: 0; }
    .refs-list a:hover { color: var(--fig); }
    .refs-list a svg {
      width: 14px; height: 14px;
      color: var(--muted);
      flex-shrink: 0;
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .refs-list a:hover svg { color: var(--fig); transform: translateX(2px); }
    body.rtl .refs-list a:hover svg { transform: translateX(-2px); }

    /* Footer */
    .foot {
      margin-top: 28px;
      text-align: center;
      font-size: var(--fs-xs);
      color: var(--muted);
      padding: 0 12px;
      letter-spacing: 0.02em;
    }
    body.rtl .foot { letter-spacing: 0; }
    .foot .sep {
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--line);
      margin: 0 10px;
      vertical-align: middle;
    }

    /* Fade-in */
    .fade-in {
      animation: fade 0.35s ease both;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: none; }
    }

    /* Focus */
    button:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--fig);
      outline-offset: 3px;
      border-radius: 6px;
    }

    @media (max-width: 380px) {
      .hero { padding: 22px 18px 24px; }
      .guide, .yt-card, .refs { padding: 18px 16px; }
      .device-tab { padding: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-in { animation: none; }
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l8 4v6c0 5-3.5 9-8 10-4.5-1-8-5-8-10V6l8-4z"/>
          </svg>
        </span>
        <span class="brand-text" id="brand-text">Parental Controls</span>
      </div>
      <div class="lang-switch" role="tablist" aria-label="Language">
        <button class="lang-btn active" id="btn-en" role="tab" aria-selected="true">EN</button>
        <button class="lang-btn" id="btn-ar" role="tab" aria-selected="false">ع</button>
      </div>
    </div>
  </div>

  <main class="wrap">
    <!-- Hero -->
    <section class="hero" aria-labelledby="hero-title">
      <span class="hero-badge" id="hero-badge">Security awareness campaign</span>
      <h1 id="hero-title"></h1>
      <p id="hero-subtitle"></p>

              'افتح تطبيق <strong>Microsoft Family Safety</strong>، أو سجّل الدخول إلى إعدادات العائلة من موقع Microsoft.',
              'اختر الطفل أو فرد العائلة الذي تريد إدارة حسابه.',
              'افتح <strong>Content filters</strong> لتصفية المواقع وعمليات البحث.',
              'اضبط <strong>Screen time</strong> وحدود التطبيقات والألعاب، وراجع <strong>Activity reporting</strong> عند الحاجة.'
            ],
            features: [
              'تصفية المواقع ونتائج البحث غير المناسبة.',
              'تحديد وقت الاستخدام عبر الأجهزة المدعومة.',
              'عرض تقارير النشاط لاستخدام الجهاز والتطبيقات.'
            ],
            privacy: 'تقارير النشاط مفيدة، لكن اجعل توقعات الأسرة واضحة حتى لا يشعر الطفل بأن المتابعة مجرد تتبع خفي.'
          },
          mac: {
            title: 'Mac',
            subtitle: 'استخدم Screen Time على macOS لإدارة التطبيقات ووقت التوقف والقيود.',
            steps: [
              'افتح <strong>System Settings</strong> على الماك.',
              'اضغط على <strong>Screen Time</strong> من الشريط الجانبي.',
              'فعّل خيارات مثل <strong>App & Website Activity</strong> و <strong>Downtime</strong> و <strong>App Limits</strong>.',
              'إذا كنت تدير حساب أحد أفراد العائلة، اختر إعدادات Screen Time الخاصة به وعدّل الحدود.'
            ],
            features: [
              'عرض تقارير نشاط التطبيقات والمواقع.',
              'تحديد وقت التوقف وحدود التطبيقات.',
              'إدارة إعدادات Screen Time لأفراد العائلة من جهاز الماك.'
            ],
            privacy: 'استعمل الحدود لبناء روتين وعادات صحية. الهدف هو الدعم والتنظيم، لا التخويف أو العقاب.'
          }
        },

        refs: [
          { label: 'Apple — استخدام أدوات الرقابة الأبوية لإدارة iPhone أو iPad الخاص بطفلك', url: 'https://support.apple.com/en-sa/105121' },
          { label: 'Apple — استخدام مدة استخدام الجهاز لإدارة iPhone أو iPad الخاص بطفلك', url: 'https://support.apple.com/en-sa/108806' },
          { label: 'Apple — إعداد مدة استخدام الجهاز لطفل على iPhone', url: 'https://support.apple.com/en-sa/guide/iphone/ipha200da319/ios' },
          { label: 'Apple — مدة استخدام الجهاز على Mac', url: 'https://support.apple.com/guide/mac-pro/screen-time-apd35460a9f3/mac' },
          { label: 'Apple — تغيير إعدادات مدة استخدام الجهاز على Mac', url: 'https://support.apple.com/en-sa/guide/mac-help/mchlca5139d2/mac' },
          { label: 'Google — البدء باستخدام Family Link', url: 'https://support.google.com/families/answer/7101025?hl=ar' },
          { label: 'Google — إدارة تطبيقات Google Play الخاصة بطفلك', url: 'https://support.google.com/families/answer/7103028?hl=ar' },
          { label: 'Google Play — إعداد أدوات الرقابة الأبوية', url: 'https://support.google.com/googleplay/answer/1075738?hl=ar' },
          { label: 'Microsoft — تصفية المواقع وعمليات البحث باستخدام Family Safety', url: 'https://support.microsoft.com/en-us/family-safety/filter-websites-and-searches-using-microsoft-family-safety' },
          { label: 'Microsoft — عرض استخدام الجهاز والتطبيقات عبر Activity reporting', url: 'https://support.microsoft.com/en-us/family-safety/view-device-and-app-use-with-family-safety-activity-reporting' },
          { label: 'YouTube — إعدادات السلامة الرقمية وإدارة الوقت', url: 'https://support.google.com/youtube/answer/9012523?hl=ar' }
        ]
      }
    };

    let currentLang = 'en';
    let currentDevice = 'iphone';

    const $ = (id) => document.getElementById(id);
    const deviceTabs = [...document.querySelectorAll('.device-tab')];

    function setText(id, v) {
      const el = $(id);
      if (el) el.textContent = v;
    }

    function render() {
      const t = content[currentLang];
      document.documentElement.lang = currentLang === 'ar' ? 'ar' : 'en';
      document.documentElement.dir = t.dir;
      document.body.classList.toggle('rtl', t.dir === 'rtl');

      $('btn-en').classList.toggle('active', currentLang === 'en');
      $('btn-ar').classList.toggle('active', currentLang === 'ar');
      $('btn-en').setAttribute('aria-selected', currentLang === 'en');
      $('btn-ar').setAttribute('aria-selected', currentLang === 'ar');

      setText('brand-text', t.brand);
      setText('hero-badge', t.heroBadge);
      setText('hero-title', t.heroTitle);
      setText('hero-subtitle', t.heroSubtitle);
      setText('meta-1', t.meta1);
      setText('meta-2', t.meta2);

      setText('device-eyebrow', t.deviceEyebrow);
      setText('device-title', t.deviceTitle);
      setText('device-subtitle', t.deviceSubtitle);

      setText('d-iphone', t.deviceDescriptions.iphone);
      setText('d-android', t.deviceDescriptions.android);
      setText('d-windows', t.deviceDescriptions.windows);
      setText('d-mac', t.deviceDescriptions.mac);

      setText('steps-label', t.stepsLabel);
      setText('features-title', t.featuresTitle);
      setText('privacy-title', t.privacyTitle);

      setText('yt-eyebrow', t.ytEyebrow);
      setText('yt-heading', t.ytHeading);
      setText('yt-lead', t.ytLead);
      setText('yt-title', t.ytTitle);
      setText('yt-subtitle', t.ytSubtitle);
      setText('yt-steps-label', t.ytStepsLabel);
      setText('yt-note-text', t.ytNote);

      const ytList = $('yt-steps');
      ytList.innerHTML = '';
      t.ytSteps.forEach((s, i) => {
        const li = document.createElement('li');
        li.className = 'step';
        li.innerHTML = `<span class="step-num">${i + 1}</span>${s}`;
        ytList.appendChild(li);
      });

      setText('tips-eyebrow', t.tipsEyebrow);
      setText('tips-title', t.tipsTitle);
      setText('tips-subtitle', t.tipsSubtitle);

      const tipsGrid = $('tips-grid');
      tipsGrid.innerHTML = '';
      const tipIcons = [
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v2"/><path d="M12 19v2"/><path d="M5 12H3"/><path d="M21 12h-2"/><circle cx="12" cy="12" r="5"/></svg>'
      ];
      t.tips.forEach((tip, i) => {
        const card = document.createElement('div');
        card.className = 'tip';
        card.innerHTML = `<span class="tip-ic" aria-hidden="true">${tipIcons[i % tipIcons.length]}</span><h4>${tip.t}</h4><p>${tip.d}</p>`;
        tipsGrid.appendChild(card);
      });

      setText('awareness-label-text', t.awarenessLabel);
      setText('awareness-text', t.awarenessText);

      setText('refs-eyebrow', t.refsEyebrow);
      setText('refs-title', t.refsTitle);
      setText('refs-subtitle', t.refsSubtitle);

      const refsList = $('refs-list');
      refsList.innerHTML = '';
      const arrow = t.dir === 'rtl'
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
      t.refs.forEach(r => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = r.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = `<span>${r.label}</span>${arrow}`;
        li.appendChild(a);
        refsList.appendChild(li);
      });

      setText('foot-left', t.footLeft);
      setText('foot-right', t.footRight);

      renderDevice();
    }

    function renderDevice() {
      const d = content[currentLang].devices[currentDevice];
      const guide = $('guide');
      guide.classList.remove('fade-in');
      void guide.offsetWidth;
      guide.classList.add('fade-in');

      setText('guide-title', d.title);
      setText('guide-subtitle', d.subtitle);
      setText('privacy-text', d.privacy);

      const stepsList = $('steps-list');
      stepsList.innerHTML = '';
      d.steps.forEach((s, i) => {
        const li = document.createElement('li');
        li.className = 'step';
        li.innerHTML = `<span class="step-num">${i + 1}</span>${s}`;
        stepsList.appendChild(li);
      });

      const featuresList = $('features-list');
      featuresList.innerHTML = '';
      d.features.forEach(f => {
        const li = document.createElement('li');
        li.innerHTML = f;
        featuresList.appendChild(li);
      });

      deviceTabs.forEach(tab => {
        const active = tab.dataset.device === currentDevice;
        tab.classList.toggle('active', active);
        tab.setAttribute('aria-selected', active);
      });
    }

    $('btn-en').addEventListener('click', () => { currentLang = 'en'; render(); });
    $('btn-ar').addEventListener('click', () => { currentLang = 'ar'; render(); });

    deviceTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        currentDevice = tab.dataset.device;
        renderDevice();
      });
    });

    render();
  </script>
</body>
</html>
