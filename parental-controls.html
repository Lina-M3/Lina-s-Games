<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b5d57" />
  <meta name="description" content="Parental Controls — a simple, bilingual guide for parents to keep kids safe online across iPhone, Android, Windows, Mac, and YouTube." />
  <title>Parental Controls · Keeping Kids Safe Online</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f4ef;
      --bg-2: #fbfaf6;
      --surface: #ffffff;
      --ink: #16201e;
      --ink-2: #3b4744;
      --muted: #6b7771;
      --line: #e7e1d6;
      --line-2: #efeae0;

      --brand: #0b5d57;
      --brand-2: #094842;
      --brand-soft: #e6f2f0;

      --accent: #d46b3d;
      --accent-soft: #fdece2;

      --warning: #b45309;
      --warning-soft: #fef3c7;

      --shadow-sm: 0 1px 2px rgba(22, 32, 30, 0.04), 0 1px 3px rgba(22, 32, 30, 0.06);
      --shadow-md: 0 4px 12px rgba(22, 32, 30, 0.06), 0 2px 4px rgba(22, 32, 30, 0.04);
      --shadow-lg: 0 20px 40px rgba(22, 32, 30, 0.08), 0 6px 12px rgba(22, 32, 30, 0.04);

      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 22px;
      --r-xl: 28px;

      --font-en: "Plus Jakarta Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --font-ar: "IBM Plex Sans Arabic", "Tajawal", system-ui, Tahoma, sans-serif;
    }

    *,
    *::before,
    *::after { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      font-family: var(--font-en);
      font-size: 16px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      background-image:
        radial-gradient(1200px 600px at 90% -200px, rgba(11, 93, 87, 0.08), transparent 60%),
        radial-gradient(900px 500px at -10% 10%, rgba(212, 107, 61, 0.06), transparent 60%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body.rtl {
      font-family: var(--font-ar);
    }

    body.rtl h1, body.rtl h2, body.rtl h3 {
      letter-spacing: 0;
    }

    img, svg { display: block; max-width: 100%; }
    a { color: inherit; }
    button { font: inherit; color: inherit; }

    /* ─── Layout ─── */
    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 0 16px calc(40px + env(safe-area-inset-bottom));
    }

    /* ─── Top bar ─── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: saturate(1.2) blur(12px);
      -webkit-backdrop-filter: saturate(1.2) blur(12px);
      background: rgba(246, 244, 239, 0.82);
      border-bottom: 1px solid rgba(231, 225, 214, 0.7);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      max-width: 760px;
      margin: 0 auto;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(140deg, var(--brand), var(--brand-2));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 4px 10px rgba(11, 93, 87, 0.25);
    }
    .brand-mark svg { width: 18px; height: 18px; }
    .brand-text { font-size: 0.95rem; }

    .lang-switch {
      display: inline-flex;
      padding: 3px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
    }
    .lang-btn {
      border: 0;
      background: transparent;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--ink-2);
      transition: color 0.2s ease;
    }
    .lang-btn.active {
      background: var(--ink);
      color: #fff;
    }

    /* ─── Hero ─── */
    .hero {
      margin-top: 22px;
      position: relative;
      overflow: hidden;
      border-radius: var(--r-xl);
      padding: 28px 22px 30px;
      color: #f5f7f6;
      background:
        radial-gradient(900px 400px at 110% -50%, rgba(212,107,61,0.28), transparent 60%),
        linear-gradient(150deg, #0b5d57 0%, #094842 60%, #0a3f3a 100%);
      box-shadow: var(--shadow-lg);
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(255,255,255,0.09) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.4;
      pointer-events: none;
      mask-image: linear-gradient(180deg, black 20%, transparent 90%);
      -webkit-mask-image: linear-gradient(180deg, black 20%, transparent 90%);
    }
    .hero-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.22);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    body.rtl .hero-badge { letter-spacing: 0; text-transform: none; }
    .hero-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #9ae6b4;
      box-shadow: 0 0 0 3px rgba(154,230,180,0.2);
    }
    .hero h1 {
      position: relative;
      margin: 14px 0 10px;
      font-size: clamp(1.7rem, 6.5vw, 2.4rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 700;
    }
    .hero p {
      position: relative;
      margin: 0;
      color: rgba(245,247,246,0.86);
      font-size: 0.98rem;
      max-width: 54ch;
    }
    .hero-meta {
      position: relative;
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }
    .meta-chip svg { width: 14px; height: 14px; stroke: #b8e8e1; }

    /* ─── Section shell ─── */
    .section {
      margin-top: 26px;
    }
    .section-head {
      margin-bottom: 14px;
      padding: 0 4px;
    }
    .eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brand);
      margin: 0 0 6px;
    }
    body.rtl .eyebrow { letter-spacing: 0; text-transform: none; }
    .section h2 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .section .lead {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ─── Device chooser ─── */
    .device-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 4px 10px;
      margin: 0 -4px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .device-tabs::-webkit-scrollbar { display: none; }
    .device-tab {
      flex: 0 0 auto;
      min-width: 132px;
      scroll-snap-align: start;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 12px 14px;
      cursor: pointer;
      text-align: start;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    .device-tab:hover {
      border-color: #cfd8d5;
      transform: translateY(-1px);
    }
    .device-tab.active {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft), var(--shadow-sm);
      background: #fdfdf9;
    }
    .device-tab .icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--brand-soft);
      color: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    .device-tab .icon svg { width: 16px; height: 16px; }
    .device-tab .t-name {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--ink);
      line-height: 1.25;
    }
    .device-tab .t-desc {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.35;
    }

    /* ─── Guide card ─── */
    .guide {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 22px;
      box-shadow: var(--shadow-md);
    }
    .guide-title-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }
    .guide-title-row .icon {
      width: 38px; height: 38px;
      border-radius: 11px;
      background: var(--brand-soft);
      color: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .guide-title-row .icon svg { width: 20px; height: 20px; }
    .guide-title-row h3 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .guide-title-row p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* Steps */
    .sub-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin: 18px 0 10px;
    }
    body.rtl .sub-label { letter-spacing: 0; text-transform: none; }

    .steps {
      list-style: none;
      margin: 0;
      padding: 0;
      position: relative;
    }
    .steps::before {
      content: "";
      position: absolute;
      top: 14px;
      bottom: 14px;
      inset-inline-start: 14px;
      width: 2px;
      background: linear-gradient(180deg, var(--brand-soft), transparent);
      border-radius: 2px;
    }
    .step {
      position: relative;
      padding-inline-start: 42px;
      padding-block: 8px;
      font-size: 0.95rem;
      color: var(--ink-2);
    }
    .step + .step { margin-top: 6px; }
    .step-num {
      position: absolute;
      inset-inline-start: 0;
      top: 6px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--brand);
      color: var(--brand);
      font-weight: 700;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 4px var(--bg);
    }
    .step strong { color: var(--ink); font-weight: 600; }

    /* Feature / privacy boxes */
    .info-stack {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .info-box {
      padding: 16px;
      border-radius: var(--r-md);
      border: 1px solid var(--line);
      background: var(--bg-2);
    }
    .info-box.privacy {
      background: var(--accent-soft);
      border-color: #f8d5be;
    }
    .info-box-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      margin: 0 0 8px;
      color: var(--ink);
    }
    .info-box-title svg { width: 16px; height: 16px; }
    .info-box.privacy .info-box-title { color: #8a4117; }
    .info-box.privacy .info-box-title svg { stroke: #b45309; }
    .info-box ul {
      margin: 0;
      padding-inline-start: 20px;
      color: var(--ink-2);
      font-size: 0.9rem;
    }
    .info-box ul li + li { margin-top: 4px; }
    .info-box p { margin: 0; color: var(--ink-2); font-size: 0.9rem; }

    /* ─── YouTube Shorts special card ─── */
    .yt-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 22px;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }
    .yt-card::before {
      content: "";
      position: absolute;
      top: -40px;
      inset-inline-end: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 0, 0, 0.08), transparent 70%);
      pointer-events: none;
    }
    .yt-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 6px;
    }
    .yt-logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: #ff0000;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(255, 0, 0, 0.22);
    }
    .yt-logo svg { width: 24px; height: 24px; color: #fff; }
    .yt-head h3 {
      margin: 2px 0 4px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .yt-head p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .yt-note {
      margin-top: 14px;
      padding: 12px 14px;
      background: #fff9ec;
      border: 1px solid #f5e3b7;
      border-radius: var(--r-sm);
      color: #7a5a10;
      font-size: 0.85rem;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .yt-note svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; stroke: #b45309; }

    /* Tips grid */
    .tips {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 560px) {
      .tips { grid-template-columns: 1fr 1fr; }
    }
    .tip {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    .tip-ic {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--brand-soft);
      color: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .tip-ic svg { width: 16px; height: 16px; }
    .tip h4 {
      margin: 0 0 4px;
      font-size: 0.98rem;
      font-weight: 700;
    }
    .tip p {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    /* Awareness message */
    .awareness {
      margin-top: 16px;
      padding: 20px;
      border-radius: var(--r-lg);
      background: linear-gradient(135deg, #0f2d2a 0%, #112f2c 100%);
      color: #e8f1ef;
      border: 1px solid #0a2623;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }
    .awareness::before {
      content: "";
      position: absolute;
      top: -60px;
      inset-inline-end: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,107,61,0.3), transparent 70%);
      pointer-events: none;
    }
    .awareness-label {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f2c49a;
      margin-bottom: 8px;
    }
    body.rtl .awareness-label { letter-spacing: 0; text-transform: none; }
    .awareness p {
      position: relative;
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.6;
    }

    /* References */
    .refs {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .refs-list {
      list-style: none;
      margin: 14px 0 0;
      padding: 0;
      display: grid;
      gap: 2px;
    }
    .refs-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 4px;
      text-decoration: none;
      border-bottom: 1px solid var(--line-2);
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.15s ease;
    }
    .refs-list li:last-child a { border-bottom: 0; }
    .refs-list a:hover { color: var(--brand); }
    .refs-list a svg {
      width: 14px; height: 14px;
      color: var(--muted);
      flex-shrink: 0;
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .refs-list a:hover svg { color: var(--brand); transform: translateX(2px); }
    body.rtl .refs-list a:hover svg { transform: translateX(-2px); }

    /* Footer */
    .foot {
      margin-top: 30px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0 12px;
    }
    .foot .sep {
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--line);
      margin: 0 10px;
      vertical-align: middle;
    }

    /* Fade-in */
    .fade-in {
      animation: fade 0.35s ease both;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: none; }
    }

    /* Focus-visible */
    button:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 3px;
      border-radius: 6px;
    }

    @media (max-width: 420px) {
      .hero { padding: 24px 20px 26px; }
      .guide, .yt-card, .refs { padding: 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-in { animation: none; }
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l8 4v6c0 5-3.5 9-8 10-4.5-1-8-5-8-10V6l8-4z"/>
          </svg>
        </span>
        <span class="brand-text" id="brand-text">Parental Controls</span>
      </div>
      <div class="lang-switch" role="tablist" aria-label="Language">
        <button class="lang-btn active" id="btn-en" role="tab" aria-selected="true">EN</button>
        <button class="lang-btn" id="btn-ar" role="tab" aria-selected="false">ع</button>
      </div>
    </div>
  </div>

  <main class="wrap">
    <!-- Hero -->
    <section class="hero" aria-labelledby="hero-title">
      <span class="hero-badge" id="hero-badge">Information Security Booth</span>
      <h1 id="hero-title"></h1>
      <p id="hero-subtitle"></p>
      <div class="hero-meta">
        <span class="meta-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span id="meta-1"></span>
        </span>
        <span class="meta-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="meta-2"></span>
        </span>
      </div>
    </section>

    <!-- Device chooser -->
    <section class="section">
      <div class="section-head">
        <p class="eyebrow" id="device-eyebrow"></p>
        <h2 id="device-title"></h2>
        <p class="lead" id="device-subtitle"></p>
      </div>

      <div class="device-tabs" role="tablist" aria-label="Device">
        <button class="device-tab active" data-device="iphone" role="tab" aria-selected="true">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="3"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          </span>
          <span class="t-name">iPhone / iPad</span>
          <span class="t-desc" id="d-iphone"></span>
        </button>

              'فعّل خيارات مثل <strong>App & Website Activity</strong> و <strong>Downtime</strong> و <strong>App Limits</strong>.',
              'إذا كنت تدير حساب أحد أفراد العائلة، اختر إعدادات Screen Time الخاصة به وعدّل الحدود.'
            ],
            features: [
              'عرض تقارير نشاط التطبيقات والمواقع.',
              'تحديد وقت التوقف وحدود التطبيقات.',
              'إدارة إعدادات Screen Time لأفراد العائلة من جهاز الماك.'
            ],
            privacy: 'استعمل الحدود لبناء روتين وعادات صحية. الهدف هو الدعم والتنظيم، لا التخويف أو العقاب.'
          }
        },

        refs: [
          { label: 'Apple — استخدام أدوات الرقابة الأبوية لإدارة iPhone أو iPad الخاص بطفلك', url: 'https://support.apple.com/en-sa/105121' },
          { label: 'Apple — استخدام مدة استخدام الجهاز لإدارة iPhone أو iPad الخاص بطفلك', url: 'https://support.apple.com/en-sa/108806' },
          { label: 'Apple — إعداد مدة استخدام الجهاز لطفل على iPhone', url: 'https://support.apple.com/en-sa/guide/iphone/ipha200da319/ios' },
          { label: 'Apple — مدة استخدام الجهاز على Mac', url: 'https://support.apple.com/guide/mac-pro/screen-time-apd35460a9f3/mac' },
          { label: 'Apple — تغيير إعدادات مدة استخدام الجهاز على Mac', url: 'https://support.apple.com/en-sa/guide/mac-help/mchlca5139d2/mac' },
          { label: 'Google — البدء باستخدام Family Link', url: 'https://support.google.com/families/answer/7101025?hl=ar' },
          { label: 'Google — إدارة تطبيقات Google Play الخاصة بطفلك', url: 'https://support.google.com/families/answer/7103028?hl=ar' },
          { label: 'Google Play — إعداد أدوات الرقابة الأبوية', url: 'https://support.google.com/googleplay/answer/1075738?hl=ar' },
          { label: 'Microsoft — تصفية المواقع وعمليات البحث باستخدام Family Safety', url: 'https://support.microsoft.com/en-us/family-safety/filter-websites-and-searches-using-microsoft-family-safety' },
          { label: 'Microsoft — عرض استخدام الجهاز والتطبيقات عبر Activity reporting', url: 'https://support.microsoft.com/en-us/family-safety/view-device-and-app-use-with-family-safety-activity-reporting' },
          { label: 'YouTube — إعدادات السلامة الرقمية وإدارة الوقت', url: 'https://support.google.com/youtube/answer/9012523?hl=ar' }
        ]
      }
    };

    let currentLang = 'en';
    let currentDevice = 'iphone';

    const $ = (id) => document.getElementById(id);
    const deviceTabs = [...document.querySelectorAll('.device-tab')];

    function setText(id, v) {
      const el = $(id);
      if (el) el.textContent = v;
    }

    function render() {
      const t = content[currentLang];
      document.documentElement.lang = currentLang === 'ar' ? 'ar' : 'en';
      document.documentElement.dir = t.dir;
      document.body.classList.toggle('rtl', t.dir === 'rtl');

      $('btn-en').classList.toggle('active', currentLang === 'en');
      $('btn-ar').classList.toggle('active', currentLang === 'ar');
      $('btn-en').setAttribute('aria-selected', currentLang === 'en');
      $('btn-ar').setAttribute('aria-selected', currentLang === 'ar');

      setText('brand-text', t.brand);
      setText('hero-badge', t.heroBadge);
      setText('hero-title', t.heroTitle);
      setText('hero-subtitle', t.heroSubtitle);
      setText('meta-1', t.meta1);
      setText('meta-2', t.meta2);

      setText('device-eyebrow', t.deviceEyebrow);
      setText('device-title', t.deviceTitle);
      setText('device-subtitle', t.deviceSubtitle);

      setText('d-iphone', t.deviceDescriptions.iphone);
      setText('d-android', t.deviceDescriptions.android);
      setText('d-windows', t.deviceDescriptions.windows);
      setText('d-mac', t.deviceDescriptions.mac);

      setText('steps-label', t.stepsLabel);
      setText('features-title', t.featuresTitle);
      setText('privacy-title', t.privacyTitle);

      setText('yt-eyebrow', t.ytEyebrow);
      setText('yt-heading', t.ytHeading);
      setText('yt-lead', t.ytLead);
      setText('yt-title', t.ytTitle);
      setText('yt-subtitle', t.ytSubtitle);
      setText('yt-steps-label', t.ytStepsLabel);
      setText('yt-note-text', t.ytNote);

      const ytList = $('yt-steps');
      ytList.innerHTML = '';
      t.ytSteps.forEach((s, i) => {
        const li = document.createElement('li');
        li.className = 'step';
        li.innerHTML = `<span class="step-num">${i + 1}</span>${s}`;
        ytList.appendChild(li);
      });

      setText('tips-eyebrow', t.tipsEyebrow);
      setText('tips-title', t.tipsTitle);
      setText('tips-subtitle', t.tipsSubtitle);

      const tipsGrid = $('tips-grid');
      tipsGrid.innerHTML = '';
      const tipIcons = [
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v2"/><path d="M12 19v2"/><path d="M5 12H3"/><path d="M21 12h-2"/><circle cx="12" cy="12" r="5"/></svg>'
      ];
      t.tips.forEach((tip, i) => {
        const card = document.createElement('div');
        card.className = 'tip';
        card.innerHTML = `<span class="tip-ic" aria-hidden="true">${tipIcons[i % tipIcons.length]}</span><h4>${tip.t}</h4><p>${tip.d}</p>`;
        tipsGrid.appendChild(card);
      });

      setText('awareness-label-text', t.awarenessLabel);
      setText('awareness-text', t.awarenessText);

      setText('refs-eyebrow', t.refsEyebrow);
      setText('refs-title', t.refsTitle);
      setText('refs-subtitle', t.refsSubtitle);

      const refsList = $('refs-list');
      refsList.innerHTML = '';
      const arrow = t.dir === 'rtl'
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
      t.refs.forEach(r => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = r.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = `<span>${r.label}</span>${arrow}`;
        li.appendChild(a);
        refsList.appendChild(li);
      });

      setText('foot-left', t.footLeft);
      setText('foot-right', t.footRight);

      renderDevice();
    }

    function renderDevice() {
      const d = content[currentLang].devices[currentDevice];
      const guide = $('guide');
      guide.classList.remove('fade-in');
      // force reflow to restart animation
      void guide.offsetWidth;
      guide.classList.add('fade-in');

      setText('guide-title', d.title);
      setText('guide-subtitle', d.subtitle);
      setText('privacy-text', d.privacy);

      const stepsList = $('steps-list');
      stepsList.innerHTML = '';
      d.steps.forEach((s, i) => {
        const li = document.createElement('li');
        li.className = 'step';
        li.innerHTML = `<span class="step-num">${i + 1}</span>${s}`;
        stepsList.appendChild(li);
      });

      const featuresList = $('features-list');
      featuresList.innerHTML = '';
      d.features.forEach(f => {
        const li = document.createElement('li');
        li.innerHTML = f;
        featuresList.appendChild(li);
      });

      deviceTabs.forEach(tab => {
        const active = tab.dataset.device === currentDevice;
        tab.classList.toggle('active', active);
        tab.setAttribute('aria-selected', active);
      });
    }

    $('btn-en').addEventListener('click', () => { currentLang = 'en'; render(); });
    $('btn-ar').addEventListener('click', () => { currentLang = 'ar'; render(); });

    deviceTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        currentDevice = tab.dataset.device;
        renderDevice();
        // scroll tab into view on mobile
        tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    });

    render();
  </script>
</body>
</html>
